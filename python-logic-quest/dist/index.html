<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Quest - Misión Espacial</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <!-- Skulpt CDN para compilar Python en el cliente -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" type="text/javascript"></script> 
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js" type="text/javascript"></script> 
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js" type="text/javascript"></script> 
  <script type="module" crossorigin src="/assets/index-DD6guYO6.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-8I_nGEiH.css">
</head>
<body>
  <div id="game-container">
    <header class="game-header">
      <h1>🚀 PYTHON QUEST: OPERATION NEBULA</h1>
      <div id="game-stats" style="display: flex; gap: 2rem; align-items: center;">
        <div id="score-display">Puntos: <span id="score-text">0</span></div>
        <div id="level-display">Nivel: <span id="current-level-text">1</span></div>
      </div>
    </header>
    
    <main class="game-layout">
      <!-- Izquierda: Historia y visualización -->
      <section class="story-panel panel">
        <h2 id="level-title">Iniciando Sistemas...</h2>
        <p id="level-description">Cargando la misión...</p>
        <div class="ship-status">
          <h3>🎮 ESTADO DE NAVE:</h3>
          <div id="game-visualizer">
            <!-- Los elementos visuales interactivos se generan acá -->
          </div>
        </div>
      </section>

      <!-- Derecha: Editor y terminal -->
      <section class="editor-panel panel">
        <div class="panel-header">
          <span class="icon">🖥️</span> terminal_nave.py
        </div>
        <div class="editor-wrapper">
          <textarea id="code-editor" spellcheck="false"></textarea>
        </div>
        <div class="controls">
          <button id="run-btn" class="cyber-btn">Ejecutar Código</button>
        </div>

        <div class="terminal">
          <div class="terminal-header">Salida del Sistema</div>
          <pre id="output-log"></pre>
        </div>
      </section>
    </main>

    <!-- Modal al completar nivel -->
    <div id="success-overlay" class="hidden">
      <div class="overlay-content">
        <h2>✅ MISIÓN EXITOSA</h2>
        <p id="success-message">¡El sistema ha sido reparado!</p>
        <button id="next-level-btn" class="cyber-btn primary">Siguiente Nivel ➡️</button>
      </div>
    </div>
  </div>

</body>
</html>
