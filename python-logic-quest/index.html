<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Python Quest - Misión Espacial</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" type="text/javascript"></script> 
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js" type="text/javascript"></script> 
  <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js" type="text/javascript"></script> 
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div id="game-container">
    <header class="game-header glass-panel">
      <h1>OPERACION NEBULA</h1>
      <div id="game-stats" class="stats-container">
        <div id="score-display">PUNTOS <span id="score-text">0</span></div>
        <div id="level-display">NIVEL <span id="current-level-text">1</span></div>
      </div>
    </header>
    
    <main class="game-layout">
      <aside class="sidebar glass-panel">
        <div class="sidebar-header">MAPA ESTELAR</div>
        <div class="level-path-container">
          <ul id="level-path-list" class="level-path">
          </ul>
        </div>
      </aside>

      <section class="story-panel glass-panel">
        <div class="mission-header">
          <h2 id="level-title">Iniciando Sistemas...</h2>
        </div>
        <div class="mission-brief-container">
          <p id="level-description" class="mission-briefing">Cargando la misión...</p>
        </div>
        <div class="ship-status glass-inset">
          <h3>ESTADO DE NAVE</h3>
          <div id="game-visualizer">
          </div>
        </div>
      </section>

      <section class="editor-panel glass-panel">
        <div class="panel-header">
          <div class="window-controls">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
          </div>
          <span class="terminal-title">terminal_nave.py</span>
        </div>
        <div class="editor-wrapper">
          <textarea id="code-editor" spellcheck="false"></textarea>
        </div>
        <div class="controls">
          <button id="run-btn" class="cyber-btn primary">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 5px;">
              <path d="M8 5V19L19 12L8 5Z" fill="currentColor"/>
            </svg>
            Ejecutar Código
          </button>
        </div>

        <div class="terminal glass-inset">
          <div class="terminal-header">SALIDA DEL SISTEMA</div>
          <pre id="output-log"></pre>
        </div>
      </section>
    </main>

    <div id="success-overlay" class="hidden">
      <div class="overlay-content glass-panel">
        <div class="icon-pulse">
           <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z" fill="var(--primary)"/></svg>
        </div>
        <h2>MISIÓN EXITOSA</h2>
        <p id="success-message">¡El sistema ha sido reparado!</p>
        <button id="next-level-btn" class="cyber-btn primary">Siguiente Nivel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
